<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>My Website</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./favicon.ico" type="image/x-icon">
  </head>
  <body>
    <style>
      button
      {
        padding: 6px 12px;
        color:oklch(93.6% 0.032 17.717);
        background: oklch(57.7% 0.245 27.325);
        a:hover 
        {
          background-color: oklch(45.7% 0.24 277.023);
          font-size: 18px;
        }
        a:active 
        {
          background-color: oklch(48.8% 0.243 264.376);
        }
        transition: background .15s ease-in;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        border-radius: 3px;
        cursor: pointer;
      }
      
      
      

    </style>
    <main>
      <h1>Welcome to My Website</h1>  
      <p>Here you will find:</p>
      <ul>
        <li>Why it's important to visit Grandma</li>
        <li>Things you forgot to do today</li>
        <li>Convenient distractions </li>
      </ul>
    </main>
  <script src="index.js"></script>
  </body>
</html>
